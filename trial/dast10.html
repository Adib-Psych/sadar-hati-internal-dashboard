<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>DAST-10 · Sadar Hati Foundation</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Lora:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --wine: #a83244;
    --wine-deep: #7a1f30;
    --sage: #5b7553;
    --sage-deep: #3e5538;
    --gold: #d4a017;
    --cream: #fef7f2;
    --navy: #1f2937;
    --slate: #64748b;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    padding: 16px 14px 60px 14px;
    font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(180deg, #fef7f2 0%, #f4efea 100%);
    color: var(--navy);
    min-height: 100vh;
  }
  .container { max-width: 480px; margin: 0 auto; }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    font-size: 12px;
  }
  .top-bar a {
    color: var(--slate);
    text-decoration: none;
    padding: 6px 10px;
    border-radius: 12px;
    background: white;
  }

  .hero {
    background: linear-gradient(135deg, var(--wine) 0%, var(--wine-deep) 100%);
    color: white;
    border-radius: 16px;
    padding: 20px 18px;
    margin-bottom: 16px;
  }
  .hero .eyebrow {
    font-size: 10px;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    opacity: 0.9;
    font-weight: 700;
  }
  .hero h1 {
    font-family: 'Lora', Georgia, serif;
    font-size: 22px;
    font-weight: 700;
    margin: 6px 0 4px 0;
  }
  .hero p {
    font-size: 12.5px;
    opacity: 0.92;
    line-height: 1.5;
    margin: 6px 0 0 0;
  }

  .section {
    background: white;
    border-radius: 14px;
    padding: 18px 16px;
    margin-bottom: 14px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.05);
  }
  .section-title {
    font-family: 'Lora', Georgia, serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--wine-deep);
    margin: 0 0 12px 0;
    padding-bottom: 10px;
    border-bottom: 1px solid #f0e7d8;
  }

  label.field {
    display: block;
    margin-bottom: 12px;
  }
  label.field .lbl {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--slate);
    letter-spacing: 0.3px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  label.field input, label.field select {
    width: 100%;
    padding: 12px 14px;
    font-size: 15px;
    border: 1.5px solid #e5e7eb;
    border-radius: 10px;
    background: #fafafa;
    font-family: inherit;
    color: var(--navy);
    -webkit-appearance: none;
    appearance: none;
  }
  label.field input:focus, label.field select:focus {
    outline: none;
    border-color: var(--wine);
    background: white;
  }
  label.field select {
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2364748b' stroke-width='2'%3e%3cpath d='M6 9l6 6 6-6'/%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 12px center;
    background-size: 20px;
    padding-right: 40px;
  }

  .question-block {
    padding: 14px 0;
    border-bottom: 1px solid #f0e7d8;
  }
  .question-block:last-child { border-bottom: none; }
  .question-num {
    display: inline-block;
    background: var(--wine);
    color: white;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    text-align: center;
    line-height: 28px;
    font-size: 12.5px;
    font-weight: 700;
    margin-right: 8px;
    vertical-align: top;
  }
  .question-text {
    display: inline-block;
    font-size: 14px;
    line-height: 1.55;
    color: var(--navy);
    width: calc(100% - 40px);
    vertical-align: top;
  }
  .yesno-row {
    display: flex;
    gap: 10px;
    margin-top: 12px;
    margin-left: 36px;
  }
  .yesno-row button {
    flex: 1;
    padding: 14px 8px;
    font-size: 15px;
    font-weight: 700;
    border: 2px solid #e5e7eb;
    border-radius: 12px;
    background: white;
    color: var(--slate);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.1s;
  }
  .yesno-row button.selected-ya {
    border-color: var(--wine);
    background: var(--wine);
    color: white;
  }
  .yesno-row button.selected-tidak {
    border-color: var(--sage);
    background: var(--sage);
    color: white;
  }

  .submit-bar {
    background: white;
    border-radius: 14px;
    padding: 18px 16px;
    margin-top: 10px;
    text-align: center;
  }
  .btn-submit {
    background: linear-gradient(135deg, var(--wine) 0%, var(--wine-deep) 100%);
    color: white;
    border: none;
    padding: 16px 24px;
    border-radius: 30px;
    font-size: 15px;
    font-weight: 700;
    width: 100%;
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 6px 16px rgba(168, 50, 68, 0.30);
  }
  .btn-submit:disabled {
    background: #d1d5db;
    box-shadow: none;
    cursor: not-allowed;
  }
  .progress-text {
    font-size: 12px;
    color: var(--slate);
    margin-bottom: 12px;
  }
  .progress-text strong { color: var(--wine); font-size: 15px; }

  /* Result modal */
  .result-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 100;
    padding: 20px 14px;
    overflow-y: auto;
    align-items: center;
    justify-content: center;
  }
  .result-overlay.show { display: flex; }
  .result-card {
    background: white;
    border-radius: 20px;
    max-width: 460px;
    width: 100%;
    padding: 24px 20px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .score-hero {
    text-align: center;
    padding: 20px;
    border-radius: 14px;
    margin-bottom: 16px;
  }
  .score-hero .score-num {
    font-family: 'Lora', Georgia, serif;
    font-size: 64px;
    font-weight: 700;
    line-height: 1;
  }
  .score-hero .score-label {
    font-size: 11px;
    letter-spacing: 1.6px;
    text-transform: uppercase;
    font-weight: 700;
    opacity: 0.85;
  }
  .interpret-box {
    background: #fef7f2;
    border-left: 4px solid var(--wine);
    padding: 14px 16px;
    border-radius: 8px;
    margin: 14px 0;
  }
  .interpret-box .lvl {
    font-family: 'Lora', Georgia, serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--wine-deep);
    margin-bottom: 6px;
  }
  .interpret-box .desc {
    font-size: 13.5px;
    color: var(--navy);
    line-height: 1.6;
  }
  .rec-box {
    background: #f0f5f1;
    border-left: 4px solid var(--sage);
    padding: 14px 16px;
    border-radius: 8px;
    margin: 12px 0;
    font-size: 12.5px;
    color: var(--navy);
    line-height: 1.55;
  }
  .rec-box strong { color: var(--sage-deep); }
  .result-actions {
    display: flex;
    gap: 8px;
    margin-top: 16px;
  }
  .result-actions button {
    flex: 1;
    padding: 12px;
    font-size: 12.5px;
    font-weight: 700;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-save { background: var(--wine); color: white; }
  .btn-close { background: #e5e7eb; color: var(--navy); }

  .scale-tint-0 { background: #f0f5f1; color: var(--sage-deep); }
  .scale-tint-1 { background: #fef9eb; color: #8a4d1f; }
  .scale-tint-2 { background: #fef0e2; color: #a04010; }
  .scale-tint-3 { background: #fde4e4; color: #a52322; }
  .scale-tint-4 { background: #fbd5d5; color: #7a1f30; }
</style>
</head>
<body>
<div class="container">

  <div class="top-bar">
    <a href="index.html">← Kembali</a>
    <span style="color:var(--slate);">Sadar Hati Foundation</span>
  </div>

  <div class="hero">
    <div class="eyebrow">💊 Skrining Napza · Formulir Assessment</div>
    <h1>DAST-10</h1>
    <p>Drug Abuse Screening Test. Isi bersama dampingan Anda. Pertanyaan tentang penggunaan Napza dalam <strong>3 bulan terakhir</strong>.</p>
  </div>

  <!-- Shared Identity/Area block (SAHA) -->
  <div class="section"><div id="saha-identity"></div></div>

  <!-- Konteks Klinis (DAST-specific) -->
  <div class="section">
    <div class="section-title">🩺 Konteks Klinis</div>
    <label class="field">
      <span class="lbl">Tipe Pengguna Drugs</span>
      <select id="f-tipepengguna">
        <option value="">-- Pilih --</option>
        <option value="PWID">PWID (Injecting Drug User)</option>
        <option value="PUD">PUD (Non-injecting Drug User)</option>
        <option value="Ex-user">Ex-user (masa pemulihan)</option>
        <option value="Poly-drug">Poly-drug user</option>
        <option value="Chemsex">Chemsex</option>
        <option value="Lainnya">Lainnya</option>
      </select>
    </label>
    <label class="field">
      <span class="lbl">Tipe Kelompok Sasaran</span>
      <select id="f-kelompoksasaran">
        <option value="">-- Pilih --</option>
        <option value="Umum">Komunitas Umum</option>
        <option value="ODHA">ODHA</option>
        <option value="WBP">Warga Binaan Pemasyarakatan (WBP)</option>
        <option value="Perempuan">Perempuan pasangan pengguna</option>
        <option value="Remaja">Remaja / Anak</option>
        <option value="LGBTQI">LGBTQI+</option>
        <option value="Lainnya">Lainnya</option>
      </select>
    </label>
  </div>

  <!-- DAST-10 Questions -->
  <div class="section">
    <div class="section-title">DAST-10 · 10 Pertanyaan</div>
    <div id="questions-container"></div>
  </div>

  <div class="submit-bar">
    <div class="progress-text">Terjawab: <strong id="answered-count">0</strong> dari <strong>10</strong> pertanyaan</div>
    <button class="btn-submit" id="btn-submit" disabled onclick="calculateScore()">📊 Hitung Skor &amp; Interpretasi</button>
  </div>

</div>

<!-- Result Modal -->
<div class="result-overlay" id="result-overlay">
  <div class="result-card">
    <div id="score-hero" class="score-hero">
      <div class="score-num" id="score-num">0</div>
      <div class="score-label">Skor Total DAST-10</div>
    </div>
    <div class="interpret-box">
      <div class="lvl" id="interpret-lvl">-</div>
      <div class="desc" id="interpret-desc">-</div>
    </div>
    <div class="rec-box" id="rec-box"></div>
    <div class="result-actions">
      <button class="btn-save" onclick="saveResult()">💾 Simpan Hasil</button>
      <button class="btn-close" onclick="closeModal()">Tutup</button>
    </div>
  </div>
</div>

<script src="saha-data.js"></script>
<script src="saha-shared.js"></script>
<script>
  const questions = [
    "Apakah Anda menggunakan obat-obatan selain yang diperlukan untuk alasan medis?",
    "Apakah Anda menyalahgunakan lebih dari satu obat pada satu waktu?",
    "Apakah Anda tidak dapat berhenti menyalahgunakan obat-obatan ketika Anda ingin?",
    "Pernahkah Anda mengalami pingsan atau tidak sadarkan diri sebagai akibat dari penggunaan narkoba?",
    "Apakah Anda pernah merasa buruk atau bersalah tentang penggunaan narkoba Anda?",
    "Apakah pasangan Anda (atau orang tua) pernah mengeluh tentang keterlibatan Anda dengan obat-obatan?",
    "Apakah Anda pernah mengabaikan keluarga Anda karena penggunaan obat-obatan?",
    "Apakah Anda pernah terlibat dalam kegiatan ilegal untuk mendapatkan obat-obatan?",
    "Pernahkah Anda mengalami gejala withdrawal (merasa sakit) ketika Anda berhenti minum obat?",
    "Apakah Anda pernah memiliki masalah medis sebagai akibat dari penggunaan obat Anda (misalnya kehilangan memori, hepatitis, kejang, pendarahan)?"
  ];

  const answers = {};
  const container = document.getElementById('questions-container');
  questions.forEach((q, i) => {
    const idx = i + 1;
    const div = document.createElement('div');
    div.className = 'question-block';
    div.innerHTML = `
      <div><span class="question-num">${idx}</span><span class="question-text">${q}</span></div>
      <div class="yesno-row">
        <button data-q="${idx}" data-a="Ya" onclick="answerQ(${idx}, 'Ya', this)">Ya</button>
        <button data-q="${idx}" data-a="Tidak" onclick="answerQ(${idx}, 'Tidak', this)">Tidak</button>
      </div>`;
    container.appendChild(div);
  });

  // Render shared identity/area block (SAHA)
  SAHA.buildIdentity('saha-identity');

  function answerQ(qn, ans, btn) {
    answers[qn] = ans;
    // Update visual
    const parent = btn.parentElement;
    parent.querySelectorAll('button').forEach(b => {
      b.classList.remove('selected-ya', 'selected-tidak');
    });
    if (ans === 'Ya') btn.classList.add('selected-ya');
    else btn.classList.add('selected-tidak');

    const count = Object.keys(answers).length;
    document.getElementById('answered-count').textContent = count;
    const submitBtn = document.getElementById('btn-submit');
    if (count === 10) submitBtn.disabled = false;
    else submitBtn.disabled = true;
  }

  function calculateScore() {
    // Scoring: 1 point for each "Ya", KECUALI Q3 yang "Tidak" dapat 1 poin
    let score = 0;
    for (let i = 1; i <= 10; i++) {
      const a = answers[i];
      if (i === 3) {
        if (a === 'Tidak') score++;
      } else {
        if (a === 'Ya') score++;
      }
    }

    let level, desc, tintClass, rec;
    if (score === 0) {
      level = 'Tidak ada masalah';
      desc = 'Tidak ada masalah yang dilaporkan terkait penyalahgunaan narkoba dalam 3 bulan terakhir.';
      tintClass = 'scale-tint-0';
      rec = '<strong>💚 Rekomendasi:</strong> Lanjutkan monitoring rutin. Berikan KIE (Komunikasi, Informasi, Edukasi) preventif tentang bahaya Napza + pemantauan berkala 6-12 bulan sekali.';
    } else if (score <= 2) {
      level = 'Level rendah';
      desc = 'Skor menunjukkan level rendah — ada indikasi minor tapi belum menandakan masalah yang serius.';
      tintClass = 'scale-tint-1';
      rec = '<strong>💛 Rekomendasi:</strong> Konseling brief intervention (5 A: Assess, Advise, Agree, Assist, Arrange). Follow-up 1-2 bulan. Berikan self-help materials + kontak layanan bila dibutuhkan.';
    } else if (score <= 5) {
      level = 'Tingkat sedang';
      desc = 'Ada indikasi masalah moderat terkait penyalahgunaan Napza. Diperlukan asesmen lanjutan.';
      tintClass = 'scale-tint-2';
      rec = '<strong>🧡 Rekomendasi:</strong> Rujukan ke asesmen klinis lanjutan (Konselor Adiksi). Rencana konseling reguler 4-8 sesi. Diskusikan opsi rehabilitasi rawat jalan (IPWL Sadar Hati). Libatkan support keluarga bila memungkinkan.';
    } else if (score <= 8) {
      level = 'Tingkat substansial';
      desc = 'Skor tinggi mengindikasikan masalah substansial. Intervensi klinis intensif direkomendasikan.';
      tintClass = 'scale-tint-3';
      rec = '<strong>❤️ Rekomendasi:</strong> Rujukan urgent ke layanan rehabilitasi IPWL/BNN. Pertimbangkan program Rehab Sosial atau Rehab Medis. Case management intensif + rencana treatment individual + medical assessment (screening HIV/HCV/IMS).';
    } else {
      level = 'Tingkat parah';
      desc = 'Skor sangat tinggi — mengindikasikan tingkat masalah parah dan risiko klinis serius.';
      tintClass = 'scale-tint-4';
      rec = '<strong>🚨 Rekomendasi:</strong> Rujukan segera ke fasilitas rehabilitasi rawat inap (IPWL RSJ / BNN / Yayasan Rehabilitasi). Medical detoxification kemungkinan dibutuhkan. Screening lengkap komorbid (kesehatan mental + fisik). Family involvement + safety planning wajib dilakukan.';
    }

    // Render result
    const hero = document.getElementById('score-hero');
    hero.className = 'score-hero ' + tintClass;
    document.getElementById('score-num').textContent = score;
    document.getElementById('interpret-lvl').textContent = level;
    document.getElementById('interpret-desc').textContent = desc;
    document.getElementById('rec-box').innerHTML = rec;
    document.getElementById('result-overlay').classList.add('show');

    // Store temporarily for save
    window._lastResult = { score, level, desc };
  }

  function saveResult() {
    if (!window._lastResult) return;
    if (!window.SAHA || !SAHA.isValid()) {
      alert('Lengkapi dulu Identitas & Area (bagian atas) sebelum simpan.\nBelum lengkap: ' + (window.SAHA ? SAHA.missing().join(', ') : 'modul belum siap'));
      return;
    }
    const id = SAHA.getIdentity();
    const key = 'sh-dast-' + Date.now();
    const record = {
      form: 'dast10',
      instrumen: 'DAST-10',
      pl: id.pl || '',
      created_at: new Date().toISOString(),
      schema_version: 'dast-1.0',
      tahun: id.tahun || '',
      tanggal: id.tanggal || '',
      wilayah: { provinsi: 'Jawa Timur', kotakab: id.kotakab || '', kecamatan: id.kecamatan || '', desa: id.desa || '', desa_manual: !!id.desa_manual },
      klien: { nama: id.nama || '', julukan: id.julukan || '', idkd: id.idkd || '', idkd_placeholder: !!id.idkd_placeholder, jk: id.jk || '', usia: id.usia || '', tgllahir: id.tgllahir || '' },
      konteks: { tipe_pengguna: document.getElementById('f-tipepengguna').value, kelompok_sasaran: document.getElementById('f-kelompoksasaran').value },
      answers: answers,
      skor: window._lastResult.score,
      interpretasi: window._lastResult.level,
      catatan_klinis: window._lastResult.desc
    };
    localStorage.setItem(key, JSON.stringify(record));
    if (window.SAHA) {
      SAHA.push(record).then(cid => { try { localStorage.setItem(key + '__cloud', cid); } catch (e) {} })
        .catch(err => console.warn('[Firestore] push gagal, tersimpan lokal:', err && err.message));
    }
    alert('✅ Hasil tersimpan (cloud + HP ini).');
    closeModal();
    if (confirm('Isi lagi untuk dampingan lain?')) window.location.reload();
    else window.location.href = 'index.html';
  }

  function closeModal() {
    document.getElementById('result-overlay').classList.remove('show');
  }
</script>
</body>
</html>
